name: 更新节目单

on:
  schedule:
    - cron: '20 0 * * *'   # 每天 00:20
    - cron: '50 09 * * *'  # 每天 9:50
    - cron: '35 14 * * *'  # 每天 14:35
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget gzip

      - name: Download and check for changes with retry
        id: check
        run: |
          MAX_RETRIES=4
          RETRY_COUNT=0
          RETRY_DELAY=300
          DOWNLOAD_SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$DOWNLOAD_SUCCESS" = false ]; do
            if [ $RETRY_COUNT -gt 0 ]; then
              echo "⏳ 第 $RETRY_COUNT 次重试，等待 $((RETRY_DELAY/60)) 分钟..."
              sleep $RETRY_DELAY
            fi
            
            echo "📥 下载 EPG 文件 (尝试 $((RETRY_COUNT+1))/$MAX_RETRIES)..."
            
            # 下载gzip压缩文件
            wget --tries=2 --timeout=30 https://github.com/kuke31/xmlgz/raw/main/e.xml.gz -O e.xml.gz 2>download_error.log
            
            if [ $? -ne 0 ] || [ ! -f e.xml.gz ] || [ ! -s e.xml.gz ]; then
              echo "⚠️ 下载失败"
              if [ -f download_error.log ]; then
                cat download_error.log
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              continue
            fi
            
            # 解压文件
            echo "📦 解压文件..."
            if gunzip -f e.xml.gz; then
              if [ -f e.xml ]; then
                echo "✅ 下载并解压成功"
                DOWNLOAD_SUCCESS=true
              else
                echo "⚠️ 解压后文件不存在"
                RETRY_COUNT=$((RETRY_COUNT + 1))
              fi
            else
              echo "⚠️ 解压失败"
              RETRY_COUNT=$((RETRY_COUNT + 1))
            fi
          done
          
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "❌ 所有重试都失败了，退出"
            exit 1
          fi
          
          # 比较文件变化
          echo "🔍 比较文件变化..."
          
          # 计算新文件的MD5
          NEW_MD5=$(md5sum e.xml | cut -d' ' -f1)
          NEW_SIZE=$(wc -c < e.xml)
          NEW_LINES=$(wc -l < e.xml)
          echo "新文件: ${NEW_SIZE} 字节, ${NEW_LINES} 行, MD5: ${NEW_MD5}"
          echo "NEW_MD5=${NEW_MD5}" >> $GITHUB_ENV
          
          # 检查是否有旧文件（从git中）
          if git show HEAD:e.xml &>/dev/null; then
            # 获取git中最后一次提交的版本
            git show HEAD:e.xml > e.xml.old 2>/dev/null || true
            if [ -f e.xml.old ]; then
              OLD_MD5=$(md5sum e.xml.old | cut -d' ' -f1)
              OLD_SIZE=$(wc -c < e.xml.old)
              OLD_LINES=$(wc -l < e.xml.old)
              echo "Git中的文件: ${OLD_SIZE} 字节, ${OLD_LINES} 行, MD5: ${OLD_MD5}"
              echo "OLD_MD5=${OLD_MD5}" >> $GITHUB_ENV
              rm -f e.xml.old
              
              if [ "$OLD_MD5" = "$NEW_MD5" ]; then
                echo "✅ 文件无变化，跳过更新"
                echo "updated=false" >> $GITHUB_OUTPUT
              else
                echo "🔄 文件有变化，准备更新"
                echo "📊 变化: $((NEW_SIZE - OLD_SIZE)) 字节, $((NEW_LINES - OLD_LINES)) 行"
                echo "updated=true" >> $GITHUB_OUTPUT
              fi
            else
              echo "🆕 无法获取git中的旧文件，视为有变化"
              echo "updated=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "🆕 首次运行，创建文件"
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
          
          echo "⏰ 检查完成时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Commit and push changes with retry
        if: steps.check.outputs.updated == 'true'
        run: |
          MAX_PUSH_RETRIES=3
          PUSH_RETRY_COUNT=0
          PUSH_SUCCESS=false
          PUSH_RETRY_DELAY=60
          
          while [ $PUSH_RETRY_COUNT -lt $MAX_PUSH_RETRIES ] && [ "$PUSH_SUCCESS" = false ]; do
            if [ $PUSH_RETRY_COUNT -gt 0 ]; then
              echo "⏳ 推送重试 $PUSH_RETRY_COUNT/$MAX_PUSH_RETRIES，等待 ${PUSH_RETRY_DELAY}秒..."
              sleep $PUSH_RETRY_DELAY
            fi
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # 获取当前分支名
            BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
            echo "当前分支: $BRANCH_NAME"
            
            # 拉取最新更改
            git pull --rebase origin $BRANCH_NAME
            
            git add e.xml
            
            if git diff --staged --quiet; then
              echo "⚠️ 没有新的更改需要提交"
              PUSH_SUCCESS=true
              break
            fi
            
            # 获取文件信息用于提交信息
            FILE_SIZE=$(wc -c < e.xml)
            FILE_LINES=$(wc -l < e.xml)
            FILE_MD5=$(md5sum e.xml | cut -d' ' -f1)
            
            # 构建提交信息 - 使用管道符避免冒号问题
            git commit -m "Update EPG file" \
              -m "- Date: $(date -u '+%Y-%m-%d %H:%M UTC')" \
              -m "- Size: ${FILE_SIZE} bytes" \
              -m "- Lines: ${FILE_LINES}" \
              -m "- MD5: ${FILE_MD5}" \
              -m "- Previous MD5: ${OLD_MD5:-None}"
            
            if git push origin $BRANCH_NAME; then
              echo "✅ 推送成功"
              PUSH_SUCCESS=true
            else
              echo "⚠️ 推送失败，重试中..."
              PUSH_RETRY_COUNT=$((PUSH_RETRY_COUNT + 1))
            fi
          done
          
          if [ "$PUSH_SUCCESS" = false ]; then
            echo "❌ 推送失败，已重试 $MAX_PUSH_RETRIES 次"
            exit 1
          fi

      - name: Skip message
        if: steps.check.outputs.updated == 'false'
        run: |
          echo "⏭️ 文件无变化，跳过提交"
          echo "📊 当前文件 MD5: $NEW_MD5"
